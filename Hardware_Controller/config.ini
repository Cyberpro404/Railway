# Hardware Controller Configuration
# Edit these values to match your setup

# Serial Communication Settings
COM_PORT = "COM5"          # Change to your device's COM port (e.g., COM3, COM6, /dev/ttyUSB0 on Linux)
BAUD_RATE = 9600          # Change if your device uses different baud rate (115200, 19200, 38400, etc.)
SERIAL_TIMEOUT = 1.0      # Timeout for read/write operations (seconds)
STARTUP_DELAY = 2.0       # Wait time after opening port (seconds) - required for device init

# API Settings
API_HOST = "0.0.0.0"      # Bind to all interfaces
API_PORT = 8000           # HTTP port for the API

# Logging
LOG_LEVEL = "INFO"        # DEBUG, INFO, WARNING, ERROR, CRITICAL

# How to find your COM port:
# Windows: Device Manager > Ports (COM & LPT) > look for "USB Serial Device" or similar
# Linux:   ls /dev/tty* | grep USB
# macOS:   ls /dev/tty.* | grep USB
#
# Common baud rates:
# 9600   - Standard/default for most Arduino boards
# 115200 - Common for newer boards
# 19200  - Some industrial devices
# 38400  - Alternative
#
# How to connect:
# 1. Connect ESP32/Arduino to PC via USB
# 2. Note the COM port (e.g., COM5)
# 3. Update COM_PORT above
# 4. Run: python main.py
# 5. Device should auto-connect on startup
#
# Test the connection:
# curl http://localhost:8000/status
#
# Send a command:
# curl -X POST http://localhost:8000/send \
#   -H "Content-Type: application/json" \
#   -d "{\"value\": 100, \"threshold\": 50}"
